name: Dependency freshness

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-deps:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check outdated dependencies
        id: outdated
        run: |
          OUTPUT=$(cargo outdated --root-deps-only --exit-code 1 2>&1) || true
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Check if there are actually outdated deps (exit code 1 = outdated found)
          cargo outdated --root-deps-only --exit-code 1 > /dev/null 2>&1 || echo "has_outdated=true" >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.outdated.outputs.has_outdated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Outdated dependencies detected';
            const body = `## Outdated Dependencies

            The weekly dependency check found outdated crates:

            \`\`\`
            ${{ steps.outdated.outputs.result }}
            \`\`\`

            Run \`cargo update\` to update compatible versions, or edit \`Cargo.toml\` for major bumps.

            _Last checked: ${new Date().toISOString().split('T')[0]}_`;

            // Find existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies',
            });
            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dependencies'],
              });
            }
